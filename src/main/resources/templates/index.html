<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head>
    <meta charset="UTF-8">
    <title>StockLens</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f6f8; color: #1a1a2e; }

        /* 헤더 */
        header { background: #ffffff; padding: 0 40px; border-bottom: 1px solid #e8eaed; display: flex; justify-content: space-between; align-items: center; height: 56px; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 18px; font-weight: 700; color: #1a1a2e; letter-spacing: -0.5px; }
        .logo span { color: #2563eb; }
        .header-right { display: flex; align-items: center; gap: 8px; }
        .btn { padding: 7px 14px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; }
        .btn-primary { background: #2563eb; color: white; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-secondary { background: #f1f3f5; color: #495057; }
        .btn-secondary:hover { background: #e9ecef; }
        .btn-outline { background: white; color: #495057; border: 1px solid #dee2e6; }
        .btn-outline:hover { background: #f8f9fa; }
        .btn-danger { background: #fee2e2; color: #dc2626; }
        .btn-danger:hover { background: #fecaca; }
        .btn-text { background: none; color: #2563eb; font-size: 13px; font-weight: 500; }
        .user-name { font-size: 13px; color: #495057; font-weight: 500; }
        a.btn { text-decoration: none; display: inline-flex; align-items: center; }

        /* 컨테이너 */
        .container { max-width: 1200px; margin: 0 auto; padding: 24px 40px; }

        /* 상단 정보 바 */
        .info-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .last-update { font-size: 12px; color: #9ca3af; }
        .action-btns { display: flex; gap: 8px; }

        /* 탭 */
        .tabs { display: flex; gap: 0; margin-bottom: 0; border-bottom: 1px solid #e8eaed; margin-bottom: -1px; }
        .tab-btn { background: none; border: none; color: #6b7280; padding: 10px 16px; cursor: pointer; font-size: 13px; font-weight: 500; border-bottom: 2px solid transparent; margin-bottom: -1px; }
        .tab-btn:hover { color: #1a1a2e; }
        .tab-btn.active { color: #2563eb; border-bottom: 2px solid #2563eb; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* 테이블 */
        .table-wrap { background: white; border-radius: 10px; border: 1px solid #e8eaed; overflow: hidden; margin-top: 16px; }
        table { width: 100%; border-collapse: collapse; }
        th { padding: 11px 16px; text-align: right; font-size: 11px; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.5px; background: #f9fafb; border-bottom: 1px solid #e8eaed; }
        th:first-child, th:nth-child(2) { text-align: left; }
        td { padding: 13px 16px; text-align: right; font-size: 13px; border-bottom: 1px solid #f3f4f6; color: #374151; }
        td:first-child, td:nth-child(2) { text-align: left; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f9fafb; }
        .rank { color: #9ca3af; font-size: 12px; font-weight: 500; }
        .stock-name { font-weight: 600; font-size: 13px; color: #111827; cursor: pointer; }
        .stock-name:hover { color: #2563eb; }
        .stock-code { font-size: 11px; color: #9ca3af; margin-top: 2px; }
        .price { font-weight: 600; font-size: 13px; color: #111827; }
        .up { color: #dc2626; }
        .down { color: #2563eb; }
        .flat { color: #6b7280; }
        .volume { color: #6b7280; font-size: 12px; }

        /* 관심 버튼 */
        .watch-btn { background: none; border: none; cursor: pointer; font-size: 16px; color: #d1d5db; padding: 2px; transition: color 0.15s; }
        .watch-btn:hover { color: #f59e0b; }
        .watch-btn.active { color: #f59e0b; }

        /* 빈 상태 */
        .empty-msg { text-align: center; padding: 60px; color: #9ca3af; font-size: 14px; }

        /* AI 추천 결과 */
        #ai-result { background: white; border: 1px solid #e8eaed; border-radius: 10px; padding: 20px; margin-bottom: 16px; line-height: 1.8; white-space: pre-wrap; display: none; font-size: 13px; color: #374151; }
        #ai-result h3 { color: #111827; font-size: 14px; font-weight: 600; margin-bottom: 12px; }

        /* 차트 팝업 */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1000; justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: white; border-radius: 12px; padding: 24px; width: 760px; max-width: 95vw; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
        .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
        .modal-title { font-size: 16px; font-weight: 700; color: #111827; }
        .modal-subtitle { font-size: 12px; color: #9ca3af; margin-top: 2px; }
        .modal-close { background: none; border: none; color: #9ca3af; font-size: 20px; cursor: pointer; padding: 0; }
        .modal-close:hover { color: #374151; }
        .stock-info-bar { display: flex; gap: 24px; margin-bottom: 16px; padding: 12px 16px; background: #f9fafb; border-radius: 8px; }
        .info-item label { font-size: 11px; color: #9ca3af; display: block; margin-bottom: 2px; }
        .info-item strong { font-size: 14px; font-weight: 600; color: #111827; }
        .chart-tabs { display: flex; gap: 4px; margin-bottom: 12px; }
        .chart-tab { background: #f1f3f5; border: none; color: #6b7280; padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: 500; }
        .chart-tab.active { background: #2563eb; color: white; }
        .chart-container { position: relative; height: 280px; }
    </style>
</head>
<body>

<header>
    <div class="logo">Stock<span>Lens</span></div>
    <div class="header-right">
        <div sec:authorize="isAuthenticated()">
            <span class="user-name" th:text="${username} + '님 환영합니다'"></span>
            <a href="/logout" class="btn btn-danger" style="margin-left:8px;">로그아웃</a>
        </div>
        <div sec:authorize="!isAuthenticated()" style="display:flex; gap:6px;">
            <a href="/login" class="btn btn-outline">로그인</a>
            <a href="/register" class="btn btn-outline">회원가입</a>
            <a href="/oauth2/authorization/google" class="btn btn-primary">Google로 시작</a>
        </div>
    </div>
</header>

<div class="container">

    <div id="ai-result">
        <h3>AI 종목 추천</h3>
        <div id="ai-content"></div>
    </div>

    <div class="info-bar">
        <span class="last-update" id="status">마지막 업데이트: 서버 시작 시점</span>
        <div class="action-btns">
            <button class="btn btn-secondary" id="ai-btn" onclick="getAiRecommend()">종목 추천</button>
            <button class="btn btn-primary" id="refresh-btn" onclick="refresh()">실시간 업데이트</button>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('all', this)">전체 Top50</button>
        <button class="tab-btn" onclick="switchTab('watchlist', this)" sec:authorize="isAuthenticated()">관심종목</button>
    </div>

    <!-- 전체 탭 -->
    <div id="tab-all" class="tab-content active">
        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>#</th>
                    <th>종목명</th>
                    <th>현재가</th>
                    <th>전일대비</th>
                    <th>등락률</th>
                    <th>거래량</th>
                    <th></th>
                </tr>
                </thead>
                <tbody id="stock-table">
                <tr th:each="stock, stat : ${stocks}">
                    <td class="rank" th:text="${stat.index + 1}"></td>
                    <td>
                        <div class="stock-name"
                             th:attr="onclick='openChart(&quot;' + ${stock.symbol} + '&quot;,&quot;' + ${stock.name} + '&quot;,' + ${stock.price} + ',' + ${stock.change} + ',' + ${stock.changePercent} + ',' + ${stock.volume} + ')'">
                            <span th:text="${stock.name}"></span>
                        </div>
                        <div class="stock-code" th:text="${stock.symbol}"></div>
                    </td>
                    <td class="price" th:text="${#numbers.formatInteger(stock.price, 1, 'COMMA')} + '원'"></td>
                    <td th:classappend="${stock.change > 0} ? 'up' : (${stock.change < 0} ? 'down' : 'flat')"
                        th:text="${stock.change > 0} ? '+' + ${stock.change} : ${stock.change}"></td>
                    <td th:classappend="${stock.changePercent > 0} ? 'up' : (${stock.changePercent < 0} ? 'down' : 'flat')"
                        th:text="${stock.changePercent > 0} ? '+' + ${stock.changePercent} + '%' : ${stock.changePercent} + '%'"></td>
                    <td class="volume" th:text="${#numbers.formatInteger(stock.volume, 1, 'COMMA')}"></td>
                    <td>
                        <button class="watch-btn"
                                th:attr="data-symbol=${stock.symbol}, data-name=${stock.name}"
                                onclick="toggleWatch(this)">★</button>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 관심종목 탭 -->
    <div id="tab-watchlist" class="tab-content">
        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>종목명</th>
                    <th>현재가</th>
                    <th>전일대비</th>
                    <th>등락률</th>
                    <th>거래량</th>
                    <th></th>
                </tr>
                </thead>
                <tbody id="watchlist-table"></tbody>
            </table>
        </div>
        <div id="watchlist-empty" class="empty-msg" style="display:none">
            관심종목을 추가해보세요
        </div>
    </div>
</div>

<!-- 차트 팝업 -->
<div class="modal-overlay" id="chart-modal">
    <div class="modal">
        <div class="modal-header">
            <div>
                <div class="modal-title" id="modal-title"></div>
                <div class="modal-subtitle" id="modal-symbol"></div>
            </div>
            <button class="modal-close" onclick="closeChart()">✕</button>
        </div>
        <div class="stock-info-bar">
            <div class="info-item">
                <label>현재가</label>
                <strong id="modal-price"></strong>
            </div>
            <div class="info-item">
                <label>전일대비</label>
                <strong id="modal-change"></strong>
            </div>
            <div class="info-item">
                <label>등락률</label>
                <strong id="modal-percent"></strong>
            </div>
            <div class="info-item">
                <label>거래량</label>
                <strong id="modal-volume"></strong>
            </div>
        </div>
        <div class="chart-tabs">
            <button class="chart-tab active" onclick="switchChartTab('daily', this)">일봉</button>
            <button class="chart-tab" onclick="switchChartTab('weekly', this)">주봉</button>
        </div>
        <div class="chart-container">
            <canvas id="stock-chart"></canvas>
        </div>
    </div>
</div>

<script>
    let currentChart = null;
    let currentSymbol = null;

    function switchTab(tab, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + tab).classList.add('active');
        if (tab === 'watchlist') loadWatchListTab();
    }

    function refresh() {
        const btn = document.getElementById('refresh-btn');
        const status = document.getElementById('status');
        btn.disabled = true;
        btn.textContent = '업데이트 중...';

        fetch('/stocks/refresh', { method: 'POST' })
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('stock-table');
                tbody.innerHTML = '';
                data.forEach((stock, i) => {
                    const changeClass = stock.change > 0 ? 'up' : stock.change < 0 ? 'down' : 'flat';
                    const changeSign = stock.change > 0 ? '+' : '';
                    tbody.innerHTML += `
                        <tr>
                            <td class="rank">${i + 1}</td>
                            <td>
                                <div class="stock-name" onclick="openChart('${stock.symbol}','${stock.name}',${stock.price},${stock.change},${stock.changePercent},${stock.volume})">${stock.name}</div>
                                <div class="stock-code">${stock.symbol}</div>
                            </td>
                            <td class="price">${stock.price.toLocaleString()}원</td>
                            <td class="${changeClass}">${changeSign}${stock.change}</td>
                            <td class="${changeClass}">${changeSign}${stock.changePercent}%</td>
                            <td class="volume">${stock.volume.toLocaleString()}</td>
                            <td><button class="watch-btn" data-symbol="${stock.symbol}" data-name="${stock.name}" onclick="toggleWatch(this)">★</button></td>
                        </tr>`;
                });
                status.textContent = '마지막 업데이트: ' + new Date().toLocaleTimeString();
                btn.disabled = false;
                btn.textContent = '실시간 업데이트';
                markWatchedStocks();
            })
            .catch(err => {
                status.textContent = '업데이트 실패';
                btn.disabled = false;
                btn.textContent = '실시간 업데이트';
            });
    }

    function getAiRecommend() {
        const btn = document.getElementById('ai-btn');
        const result = document.getElementById('ai-result');
        const content = document.getElementById('ai-content');
        btn.disabled = true;
        btn.textContent = '분석 중...';
        result.style.display = 'block';
        content.textContent = '데이터를 분석하고 있습니다...';

        fetch('/stocks/ai-recommend')
            .then(res => res.text())
            .then(data => {
                content.textContent = data;
                btn.disabled = false;
                btn.textContent = '종목 추천';
            });
    }

    function loadWatchListTab() {
        fetch('/stocks/watchlist')
            .then(res => res.json())
            .then(watchlist => {
                const tbody = document.getElementById('watchlist-table');
                const empty = document.getElementById('watchlist-empty');
                if (watchlist.length === 0) {
                    tbody.innerHTML = '';
                    empty.style.display = 'block';
                    return;
                }
                empty.style.display = 'none';
                const allRows = document.querySelectorAll('#stock-table tr');
                const stockMap = {};
                allRows.forEach(row => {
                    const code = row.querySelector('.stock-code')?.textContent;
                    if (code) stockMap[code] = row.innerHTML;
                });
                tbody.innerHTML = watchlist.map(w => {
                    const row = stockMap[w.symbol];
                    if (row) return `<tr>${row}</tr>`;
                    return `<tr>
                        <td>
                            <div class="stock-name" onclick="openChart('${w.symbol}','${w.name}',0,0,0,0)">${w.name}</div>
                            <div class="stock-code">${w.symbol}</div>
                        </td>
                        <td colspan="4" style="color:#9ca3af; font-size:12px;">업데이트 필요</td>
                        <td><button class="watch-btn active" data-symbol="${w.symbol}" data-name="${w.name}" onclick="toggleWatch(this)">★</button></td>
                    </tr>`;
                }).join('');
            });
    }

    function toggleWatch(btn) {
        const symbol = btn.getAttribute('data-symbol');
        const name = btn.getAttribute('data-name');
        const isActive = btn.classList.contains('active');
        const url = isActive ? '/stocks/watchlist/remove' : '/stocks/watchlist/add';
        const body = isActive ? `symbol=${symbol}` : `symbol=${symbol}&name=${encodeURIComponent(name)}`;

        fetch(url, {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body
        })
        .then(() => {
            btn.classList.toggle('active');
            if (document.getElementById('tab-watchlist').classList.contains('active')) {
                loadWatchListTab();
            }
        })
        .catch(() => alert('로그인이 필요합니다.'));
    }

    function markWatchedStocks() {
        fetch('/stocks/watchlist')
            .then(res => res.json())
            .then(watchlist => {
                const symbols = watchlist.map(w => w.symbol);
                document.querySelectorAll('.watch-btn').forEach(btn => {
                    if (symbols.includes(btn.getAttribute('data-symbol'))) {
                        btn.classList.add('active');
                    }
                });
            })
            .catch(() => {});
    }

    function openChart(symbol, name, price, change, changePercent, volume) {
        currentSymbol = symbol;
        document.getElementById('modal-title').textContent = name;
        document.getElementById('modal-symbol').textContent = symbol;
        document.getElementById('modal-price').textContent = Number(price).toLocaleString() + '원';

        const changeEl = document.getElementById('modal-change');
        const percentEl = document.getElementById('modal-percent');
        changeEl.textContent = (change > 0 ? '+' : '') + Number(change).toLocaleString();
        percentEl.textContent = (changePercent > 0 ? '+' : '') + changePercent + '%';
        changeEl.style.color = change > 0 ? '#dc2626' : change < 0 ? '#2563eb' : '#6b7280';
        percentEl.style.color = change > 0 ? '#dc2626' : change < 0 ? '#2563eb' : '#6b7280';
        document.getElementById('modal-volume').textContent = Number(volume).toLocaleString();

        document.getElementById('chart-modal').classList.add('active');
        document.querySelectorAll('.chart-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.chart-tab')[0].classList.add('active');
        loadChart(symbol, 'daily');
    }

    function closeChart() {
        document.getElementById('chart-modal').classList.remove('active');
        if (currentChart) { currentChart.destroy(); currentChart = null; }
    }

    function switchChartTab(type, btn) {
        document.querySelectorAll('.chart-tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        loadChart(currentSymbol, type);
    }

    function loadChart(symbol, type) {
        fetch(`/stocks/chart/${symbol}/${type}`)
            .then(res => res.json())
            .then(data => {
                const labels = data.map(d => {
                    const d_ = d.date;
                    return d_.slice(0,4) + '.' + d_.slice(4,6) + '.' + d_.slice(6,8);
                }).reverse();
                const prices = data.map(d => parseFloat(d.close)).reverse();

                if (currentChart) currentChart.destroy();

                const ctx = document.getElementById('stock-chart').getContext('2d');
                const isUp = prices[prices.length-1] >= prices[0];
                const color = isUp ? '#dc2626' : '#2563eb';

                currentChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels,
                        datasets: [{
                            data: prices,
                            borderColor: color,
                            backgroundColor: isUp ? 'rgba(220,38,38,0.05)' : 'rgba(37,99,235,0.05)',
                            borderWidth: 1.5,
                            pointRadius: 0,
                            fill: true,
                            tension: 0.1
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            x: { ticks: { color: '#9ca3af', maxTicksLimit: 8, font: { size: 11 } }, grid: { color: '#f3f4f6' } },
                            y: { ticks: { color: '#9ca3af', callback: v => v.toLocaleString(), font: { size: 11 } }, grid: { color: '#f3f4f6' } }
                        }
                    }
                });
            });
    }

    document.getElementById('chart-modal').addEventListener('click', function(e) {
        if (e.target === this) closeChart();
    });

    window.onload = () => markWatchedStocks();
</script>

</body>
</html>
