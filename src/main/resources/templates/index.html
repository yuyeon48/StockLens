<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head>
    <meta charset="UTF-8">
    <title>한국 주식 Top50</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Apple SD Gothic Neo', sans-serif; background: #0d1117; color: #e6edf3; }
        header { background: #161b22; padding: 20px 40px; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 20px; color: #58a6ff; }
        .header-btns { display: flex; align-items: center; gap: 8px; }
        #refresh-btn { background: #238636; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; }
        #refresh-btn:hover { background: #2ea043; }
        #refresh-btn:disabled { background: #444; cursor: not-allowed; }
        #ai-btn { background: #6e40c9; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; }
        #ai-btn:hover { background: #8957e5; }
        #ai-btn:disabled { background: #444; cursor: not-allowed; }
        .btn-login { background: #444; color: white; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-size: 14px; }
        .btn-register { background: #238636; color: white; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-size: 14px; }
        .btn-google { background: #4285f4; color: white; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-size: 14px; }
        .btn-logout { background: #da3633; color: white; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-size: 14px; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .container { padding: 30px 40px; }
        #status { margin-bottom: 16px; color: #8b949e; font-size: 14px; }

        /* 탭 */
        .tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid #30363d; }
        .tab-btn { background: none; border: none; color: #8b949e; padding: 10px 20px; cursor: pointer; font-size: 14px; border-bottom: 2px solid transparent; margin-bottom: -1px; }
        .tab-btn:hover { color: #e6edf3; }
        .tab-btn.active { color: #58a6ff; border-bottom: 2px solid #58a6ff; font-weight: 600; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        #ai-result { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin-bottom: 20px; line-height: 1.8; white-space: pre-wrap; display: none; }
        #ai-result h3 { color: #8957e5; margin-bottom: 12px; font-size: 16px; }
        table { width: 100%; border-collapse: collapse; background: #161b22; border-radius: 8px; overflow: hidden; }
        th { background: #21262d; padding: 14px 16px; text-align: right; font-size: 13px; color: #8b949e; border-bottom: 1px solid #30363d; }
        th:first-child, th:nth-child(2) { text-align: left; }
        td { padding: 14px 16px; text-align: right; font-size: 14px; border-bottom: 1px solid #21262d; }
        td:first-child, td:nth-child(2) { text-align: left; }
        tr:hover td { background: #1c2128; }
        .rank { color: #8b949e; font-size: 13px; }
        .name { font-weight: 600; }
        .symbol { color: #8b949e; font-size: 12px; }
        .up { color: #f85149; }
        .down { color: #58a6ff; }
        .flat { color: #8b949e; }
        .volume { color: #8b949e; }
        .watch-btn { background: none; border: 1px solid #30363d; border-radius: 4px; color: #8b949e; cursor: pointer; padding: 4px 8px; font-size: 14px; }
        .watch-btn.active { color: #f1c40f; border-color: #f1c40f; }
        .empty-msg { text-align: center; padding: 60px; color: #8b949e; font-size: 15px; }
    </style>
</head>
<body>

<header>
    <h1>🇰🇷 한국 주식 시가총액 Top 50</h1>
    <div class="header-btns">
        <button id="refresh-btn" onclick="refresh()">🔄 실시간 업데이트</button>
        <button id="ai-btn" onclick="getAiRecommend()">🤖 AI 종목 추천</button>

        <!-- 로그인 상태 -->
        <div class="user-info" sec:authorize="isAuthenticated()">
            <span th:text="${username} + '님 환영합니다! 👋'" style="color:#58a6ff; font-size:14px;"></span>
            <a href="/logout" class="btn-logout">로그아웃</a>
        </div>

        <!-- 비로그인 상태 -->
        <div class="user-info" sec:authorize="!isAuthenticated()">
            <a href="/login" class="btn-login">🔐 로그인</a>
            <a href="/register" class="btn-register">회원가입</a>
            <a href="/oauth2/authorization/google" class="btn-google">🔑 구글 로그인</a>
        </div>
    </div>
</header>

<div class="container">
    <div id="status">마지막 업데이트: 서버 시작 시점</div>

    <!-- AI 추천 결과 -->
    <div id="ai-result">
        <h3>🤖 AI 종목 추천</h3>
        <div id="ai-content"></div>
    </div>

    <!-- 탭 -->
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('all', this)">📈 전체 Top50</button>
        <button class="tab-btn" onclick="switchTab('watchlist', this)" sec:authorize="isAuthenticated()">⭐ 관심종목</button>
    </div>

    <!-- 전체 탭 -->
    <div id="tab-all" class="tab-content active">
        <table>
            <thead>
            <tr>
                <th>순위</th>
                <th>종목명</th>
                <th>현재가</th>
                <th>전일대비</th>
                <th>등락률</th>
                <th>거래량</th>
                <th>관심</th>
            </tr>
            </thead>
            <tbody id="stock-table">
            <tr th:each="stock, stat : ${stocks}">
                <td class="rank" th:text="${stat.index + 1}"></td>
                <td>
                    <div class="name" th:text="${stock.name}"></div>
                    <div class="symbol" th:text="${stock.symbol}"></div>
                </td>
                <td th:text="${#numbers.formatInteger(stock.price, 1, 'COMMA')} + '원'"></td>
                <td th:classappend="${stock.change > 0} ? 'up' : (${stock.change < 0} ? 'down' : 'flat')"
                    th:text="${stock.change > 0} ? '+' + ${stock.change} : ${stock.change}"></td>
                <td th:classappend="${stock.changePercent > 0} ? 'up' : (${stock.changePercent < 0} ? 'down' : 'flat')"
                    th:text="${stock.changePercent > 0} ? '+' + ${stock.changePercent} + '%' : ${stock.changePercent} + '%'"></td>
                <td class="volume" th:text="${#numbers.formatInteger(stock.volume, 1, 'COMMA')}"></td>
                <td>
                    <button class="watch-btn"
                            th:attr="data-symbol=${stock.symbol}, data-name=${stock.name}"
                            onclick="toggleWatch(this)">⭐</button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- 관심종목 탭 -->
    <div id="tab-watchlist" class="tab-content">
        <table>
            <thead>
            <tr>
                <th>종목명</th>
                <th>현재가</th>
                <th>전일대비</th>
                <th>등락률</th>
                <th>거래량</th>
                <th>관심</th>
            </tr>
            </thead>
            <tbody id="watchlist-table">
            </tbody>
        </table>
        <div id="watchlist-empty" class="empty-msg" style="display:none">
            ⭐ 관심종목을 추가해보세요!
        </div>
    </div>
</div>

<script>
    // 탭 전환
    function switchTab(tab, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + tab).classList.add('active');
        if (tab === 'watchlist') loadWatchListTab();
    }

    // 전체 종목 업데이트
    function refresh() {
        const btn = document.getElementById('refresh-btn');
        const status = document.getElementById('status');
        btn.disabled = true;
        btn.textContent = '⏳ 업데이트 중...';

        fetch('/stocks/refresh', { method: 'POST' })
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('stock-table');
                tbody.innerHTML = '';
                data.forEach((stock, i) => {
                    const changeClass = stock.change > 0 ? 'up' : stock.change < 0 ? 'down' : 'flat';
                    const changeSign = stock.change > 0 ? '+' : '';
                    tbody.innerHTML += `
                        <tr>
                            <td class="rank">${i + 1}</td>
                            <td><div class="name">${stock.name}</div><div class="symbol">${stock.symbol}</div></td>
                            <td>${stock.price.toLocaleString()}원</td>
                            <td class="${changeClass}">${changeSign}${stock.change}</td>
                            <td class="${changeClass}">${changeSign}${stock.changePercent}%</td>
                            <td class="volume">${stock.volume.toLocaleString()}</td>
                            <td><button class="watch-btn" data-symbol="${stock.symbol}" data-name="${stock.name}" onclick="toggleWatch(this)">⭐</button></td>
                        </tr>`;
                });
                status.textContent = '마지막 업데이트: ' + new Date().toLocaleTimeString();
                btn.disabled = false;
                btn.textContent = '🔄 실시간 업데이트';
                markWatchedStocks();
            });
    }

    // AI 추천
    function getAiRecommend() {
        const btn = document.getElementById('ai-btn');
        const result = document.getElementById('ai-result');
        const content = document.getElementById('ai-content');
        btn.disabled = true;
        btn.textContent = '⏳ AI 분석 중...';
        result.style.display = 'block';
        content.textContent = 'AI가 데이터를 분석하고 있습니다...';

        fetch('/stocks/ai-recommend')
            .then(res => res.text())
            .then(data => {
                content.textContent = data;
                btn.disabled = false;
                btn.textContent = '🤖 AI 종목 추천';
            });
    }

    // 관심종목 탭 로드
    function loadWatchListTab() {
        fetch('/stocks/watchlist')
            .then(res => res.json())
            .then(watchlist => {
                const tbody = document.getElementById('watchlist-table');
                const empty = document.getElementById('watchlist-empty');

                if (watchlist.length === 0) {
                    tbody.innerHTML = '';
                    empty.style.display = 'block';
                    return;
                }
                empty.style.display = 'none';

                // 전체 주식 데이터에서 관심종목 필터링
                const allRows = document.querySelectorAll('#stock-table tr');
                const stockMap = {};
                allRows.forEach(row => {
                    const symbol = row.querySelector('.symbol')?.textContent;
                    if (symbol) stockMap[symbol] = row.innerHTML;
                });

                tbody.innerHTML = watchlist.map(w => {
                    const row = stockMap[w.symbol];
                    if (row) {
                        return `<tr>${row}</tr>`;
                    }
                    return `<tr>
                        <td><div class="name">${w.name}</div><div class="symbol">${w.symbol}</div></td>
                        <td colspan="4" style="color:#8b949e">데이터 없음 (업데이트 필요)</td>
                        <td><button class="watch-btn active" data-symbol="${w.symbol}" data-name="${w.name}" onclick="toggleWatch(this)">⭐</button></td>
                    </tr>`;
                }).join('');
            });
    }

    // 관심종목 토글
    function toggleWatch(btn) {
        const symbol = btn.getAttribute('data-symbol');
        const name = btn.getAttribute('data-name');
        const isActive = btn.classList.contains('active');
        const url = isActive ? '/stocks/watchlist/remove' : '/stocks/watchlist/add';
        const body = isActive ? `symbol=${symbol}` : `symbol=${symbol}&name=${encodeURIComponent(name)}`;

        fetch(url, {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body
        })
        .then(() => {
            btn.classList.toggle('active');
            // 관심종목 탭이 열려있으면 새로고침
            if (document.getElementById('tab-watchlist').classList.contains('active')) {
                loadWatchListTab();
            }
        })
        .catch(() => alert('로그인이 필요합니다!'));
    }

    // 이미 관심종목인 것 표시
    function markWatchedStocks() {
        fetch('/stocks/watchlist')
            .then(res => res.json())
            .then(watchlist => {
                const symbols = watchlist.map(w => w.symbol);
                document.querySelectorAll('.watch-btn').forEach(btn => {
                    if (symbols.includes(btn.getAttribute('data-symbol'))) {
                        btn.classList.add('active');
                    }
                });
            })
            .catch(() => {});
    }

    window.onload = () => markWatchedStocks();
</script>

</body>
</html>
