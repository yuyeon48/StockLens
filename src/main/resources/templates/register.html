<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입 - StockLens</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f6f8; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; border-radius: 12px; padding: 40px; width: 380px; border: 1px solid #e8eaed; }
        .logo { font-size: 20px; font-weight: 700; color: #1a1a2e; text-align: center; margin-bottom: 6px; }
        .logo span { color: #2563eb; }
        .subtitle { text-align: center; font-size: 13px; color: #9ca3af; margin-bottom: 28px; }
        .form-group { margin-bottom: 14px; }
        label { display: block; font-size: 12px; font-weight: 500; color: #374151; margin-bottom: 6px; }
        input { width: 100%; padding: 10px 12px; border: 1px solid #e8eaed; border-radius: 7px; color: #111827; font-size: 13px; outline: none; transition: border 0.15s; }
        input:focus { border-color: #2563eb; }
        .btn-primary { width: 100%; padding: 11px; background: #2563eb; color: white; border: none; border-radius: 7px; font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 4px; }
        .btn-primary:hover { background: #1d4ed8; }
        .error { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; padding: 10px 12px; border-radius: 7px; font-size: 12px; margin-bottom: 16px; }
        .footer { text-align: center; margin-top: 20px; font-size: 12px; color: #9ca3af; }
        .footer a { color: #2563eb; text-decoration: none; font-weight: 500; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">Stock<span>Lens</span></div>
    <p class="subtitle">계정을 만들고 시작하세요</p>

    <div class="error" th:if="${error}" th:text="${error}"></div>

    <form method="post" action="/register">
        <div class="form-group">
            <label>이름</label>
            <input type="text" name="name" placeholder="홍길동" required>
        </div>
        <div class="form-group">
            <label>이메일</label>
            <input type="email" name="email" placeholder="name@email.com" required>
        </div>
        <div class="form-group">
            <label>비밀번호</label>
            <input type="password" name="password" placeholder="8자 이상 입력" minlength="8" required>
        </div>
        <button type="submit" class="btn-primary">회원가입</button>
    </form>

    <div class="footer">
        이미 계정이 있으신가요? <a href="/login">로그인</a>
    </div>
</div>
</body>
</html>
